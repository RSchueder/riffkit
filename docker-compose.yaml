services:

  bot:
    build:
      context: .
    volumes:
      - .:/workspace
    environment:
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER}
      - MATRIX_USER_ID=${MATRIX_USER_ID}
      - MATRIX_PASSWORD=${MATRIX_PASSWORD}
      - MATRIX_ROOM_ID=${MATRIX_ROOM_ID}
    command: ["python", "bot.py"]

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dev:
    extends: bot
    command: sleep infinity 
